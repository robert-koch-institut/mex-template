name: Cookiecutter

on:
  push:
    branches: ["main"]
    tags: ["**"]
  schedule:
    - cron: "14 3 * * 1-5"
  workflow_dispatch:

concurrency:
  group: {% raw %}${{ github.workflow }}{% endraw %}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: on
  PIP_NO_CLEAN: on
  PIP_NO_INPUT: on
  PIP_PREFER_BINARY: on
  PY_COLORS: "1"

jobs:
  cruft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          {% raw %}token: ${{ secrets.WORKFLOW_TOKEN }}{% endraw %}

      - name: Cache requirements
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          {% raw %}key: ${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}{% endraw %}
          restore-keys: |
            {% raw %}${{ env.cache-name }}-{% endraw %}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: 3.14

      - name: Install requirements
        run: make setup

      - name: Configure git
        env:
          {% raw %}MEX_BOT_EMAIL: ${{ vars.MEX_BOT_EMAIL }}{% endraw %}
          {% raw %}MEX_BOT_USER: ${{ vars.MEX_BOT_USER }}{% endraw %}
          {% raw %}SIGNING_KEY: ${{ secrets.SIGNING_KEY }}{% endraw %}
          {% raw %}SIGNING_PUB: ${{ secrets.SIGNING_PUB }}{% endraw %}
        run: |
          {% raw -%}
          eval "$(ssh-agent -s)"
          mex setup-commit-signing
          {%- endraw %}

      - name: Update template
        env:
          {% raw %}GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}{% endraw %}
        run: |
          {% raw -%}
          if cruft check; then
            echo template is up to date
            exit 0
          fi
          if [[ $(gh pr list --label cruft | wc -c) -ne 0 ]]; then
            echo already seeing pull request
            exit 0
          fi
          template_url=$(python -c "print(__import__('json').load(open('.cruft.json'))['template'])")
          template_ref=$(git ls-remote ${template_url} --heads main --exit-code | cut -c -6)
          git checkout main
          git checkout -b cruft/cookiecutter-template-${template_ref}
          cruft update --skip-apply-ask
          printf '### Changes\n\n- bumped cookiecutter template to %s/commit/%s\n' "$template_url" "$template_ref" > .cruft-pr-body
          sed -i "0,/^### Changes/s|^### Changes.*|&\n\n- updated template to ${template_url}/commit/${template_ref}|" CHANGELOG.md
          if [[ $(find . -type f -name "*.rej" | wc -l) -ne 0 ]]; then
            printf '\n### Conflicts\n' >> .cruft-pr-body
          fi
          find . -type f -name "*.rej" | while read -r line ; do
            printf '\n```diff\n' >> .cruft-pr-body
            cat ${line} >> .cruft-pr-body
            printf '```\n' >> .cruft-pr-body
          done
          git add --all --verbose
          git commit --message "Bump cookiecutter template to $template_ref" --verbose
          git push --set-upstream origin cruft/cookiecutter-template-${template_ref} --force --verbose
          gh pr create --title "Bump cookiecutter template to $template_ref" --body-file .cruft-pr-body --label cruft --assignee ${{ vars.MEX_BOT_USER }}
          {%- endraw %}
