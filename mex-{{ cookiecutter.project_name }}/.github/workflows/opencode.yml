name: Opencode

on:
  push:
    branches: ["main"]
    tags: ["**"]
  workflow_dispatch:

concurrency:
  group: {% raw %}${{ github.workflow }}{% endraw %}
  cancel-in-progress: true

jobs:
  sync:
    if: {% raw %}github.repository_owner == 'robert-koch-institut'{% endraw %}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
        with:
          ref: 'main'
          fetch-depth: 0
      - name: Push main branch
        run: |
          git remote add opencode https://{% raw %}RKIMetadataExchange:${{ secrets.MEX_OPENCODE_TOKEN }}{% endraw %}@gitlab.opencode.de/robert-koch-institut/mex/mex-{{ cookiecutter.project_name }}.git
          git push opencode -f
          git push opencode -f --tags
