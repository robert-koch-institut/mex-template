name: Release

run-name: bump {% raw %}${{ inputs.version }} version by @${{ github.actor }}{% endraw %}

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: 'part of the project version to update'
        options:
        - major
        - minor
        - patch
        required: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: on
  PIP_NO_CLEAN: on
  PIP_NO_INPUT: on
  PIP_PREFER_BINARY: on
  PY_COLORS: "1"
  MEX_BOT_EMAIL: mex@rki.de
  MEX_BOT_USER: RKIMetadataExchange

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      tag: {% raw %}${{ steps.release.outputs.tag }}{% endraw %}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Cache requirements
        uses: actions/cache@v5
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          {% raw %}key: ${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}{% endraw %}
          restore-keys: |
            {% raw %}${{ env.cache-name }}-{% endraw %}

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install requirements
        run: make setup

      - name: Configure git
        env:
          {% raw %}SIGNING_KEY: ${{ secrets.MEX_SIGNING_KEY }}{% endraw %}
          {% raw %}SIGNING_PUB: ${{ vars.MEX_SIGNING_PUB }}{% endraw %}
        run: |
          {% raw -%}
          eval "$(ssh-agent -s)"
          mex setup-commit-signing
          {%- endraw %}

      - name: Release new version
        id: release
        env:
          {% raw %}GH_TOKEN: ${{ secrets.MEX_CONTENT_WRITE_TOKEN }}{% endraw %}
        run: |
          {% raw -%}
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          mex release ${{ inputs.version }}
          echo "tag=$(git describe --abbrev=0 --tags)" >> "$GITHUB_OUTPUT"
          {%- endraw %}

  containerize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          {% raw %}ref: ${{ needs.release.outputs.tag }}{% endraw %}
          persist-credentials: false

      - name: Cache requirements
        uses: actions/cache@v5
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          key: {% raw %}${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}{% endraw %}
          restore-keys: |
            {% raw %}${{ env.cache-name }}-{% endraw %}

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install requirements
        run: make setup

      - name: Generate locked requirements.txt
        run: |
          uv export --no-dev --output locked-requirements.txt --no-hashes

      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: {% raw %}${{github.actor}}{% endraw %}
          password: {% raw %}${{secrets.GITHUB_TOKEN}}{% endraw %}

      - name: Build, tag and push docker image
        env:
          {% raw %}IMAGE: ghcr.io/${{ github.repository }}{% endraw %}
          {% raw %}TAG: ${{ needs.release.outputs.tag }}{% endraw %}
        run: |
          {% raw -%}
          docker build . \
          --tag ${IMAGE}:latest \
          --tag ${IMAGE}:${{ github.sha }} \
          --tag ${IMAGE}:${TAG}
          docker push --all-tags ${IMAGE}
          {%- endraw %}

  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          {% raw %}ref: ${{ needs.release.outputs.tag }}{% endraw %}
          persist-credentials: false

      - name: Cache requirements
        uses: actions/cache@v5
        env:
          cache-name: cache-requirements
        with:
          path: ~/.cache/pip
          {% raw %}key: ${{ env.cache-name }}-${{ hashFiles('requirements.txt') }}{% endraw %}
          restore-keys: |
            {% raw %}${{ env.cache-name }}-{% endraw %}

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install requirements
        run: make setup

      - name: Build wheel and sdist distros and create a github release
        env:
          {% raw %}GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}{% endraw %}
        run: |
          {% raw -%}
          gh release create ${{ needs.release.outputs.tag }} \
          --generate-notes --latest --verify-tag
          uv build --out-dir dist
          for filename in dist/*; do
            gh release upload ${{ needs.release.outputs.tag }} ${filename};
          done
          {%- endraw %}
